kind = "mobile"
previewPath = "/"
title = "StudentOS"
version = "1.0.0"
id = "artifacts/student-os"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 18627

[services.development]
run = "pnpm --filter @workspace/student-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/student-os", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/student-os", "run", "serve" ]

[services.env]
PORT = "18627"
BASE_PATH = "/"
